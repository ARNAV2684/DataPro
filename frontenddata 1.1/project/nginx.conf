server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: route everything that isn't a real file to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache built static assets aggressively (they are content-hashed by Vite).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
